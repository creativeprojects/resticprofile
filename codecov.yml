ignore:
  - term/remote.go
  - deprecation.go
  - logger.go
  - systemd.go
  - update.go
  - main.go
  - run_profile.go
  - syslog.go
  - syslog_windows.go
  - schtasks/permission.go
  - user/user_systemd.go
  - qemu/
  - "**/mocks/*.go"
  - testhelpers/

codecov:
  notify:
    after_n_builds: 4

comment:
  after_n_builds: 4

coverage:
  round: nearest
  status:
    project:
      default:
        target: auto
        threshold: "2%"
    patch:
      default:
        target: "70%"
        threshold: "2%"
