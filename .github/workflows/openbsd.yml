name: Test on OpenBSD

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths-ignore:
      - 'docs/**'

  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'

jobs:
  build:
    name: Run tests
    strategy:
      matrix:
        openbsd_version: ['7.8']
    uses: ./.github/workflows/run-tests-vm.yml
    with:
      os: 'openbsd'
      os_version: '${{ matrix.openbsd_version }}'
    secrets: inherit
