  test-ssh:
    name: Test SSH client
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.26

      - name: Run tests
        run: |
          make start-ssh-server
          make ssh-test
          make stop-ssh-server

      - name: Upload code coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          name: code-coverage-ssh-report
          files: ./coverage-ssh.out
          fail_ci_if_error: false
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  test-freebsd:
    name: Run tests on FreeBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        freebsd_version: ['14.3', '15.0']
    env:
      GO_VERSION: '1.26.2'
    steps:
      - uses: actions/checkout@v6

      - name: Test
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '${{ matrix.freebsd_version }}'
          memory: 14G
          cpu_count: 4
          environment_variables: GO_VERSION
          run: |
            curl -LO "https://go.dev/dl/go${GO_VERSION}.freebsd-amd64.tar.gz"
            sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf go${GO_VERSION}.freebsd-amd64.tar.gz
            export PATH=$PATH:/usr/local/go/bin
            go version
            pwd
            go test -v -short ./...

  test-netbsd:
    name: Run tests on NetBSD
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        netbsd_version: ['10.1']
    env:
      GO_VERSION: '1.26.2'
    steps:
      - uses: actions/checkout@v6

      - name: Test
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: netbsd
          version: '${{ matrix.netbsd_version }}'
          memory: 14G
          cpu_count: 4
          environment_variables: GO_VERSION
          run: |
            curl -LO "https://go.dev/dl/go1.26.2.netbsd-amd64.tar.gz"
            sudo mkdir -p /usr/local
            sudo rm -rf /usr/local/go
            sudo tar -C /usr/local -xzf go1.26.2.netbsd-amd64.tar.gz
            export PATH=$PATH:/usr/local/go/bin
            go version
            pwd
            go test -v -short ./...

  test-openbsd:
    name: Run tests on OpenBSD
    runs-on: ubuntu-latest
    continue-on-error: true
