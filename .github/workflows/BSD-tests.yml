          find . -type f -name "*.test" | xargs -I % echo "echo === % === && % -test.short -test.v" >>./run-tests.sh
        env:
          GOOS: openbsd

      - name: Run tests in VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: openbsd
          version: '${{ matrix.openbsd_version }}'
          memory: 8G
          cpu_count: 4
          run: |
            pwd
            ./run-tests.sh
