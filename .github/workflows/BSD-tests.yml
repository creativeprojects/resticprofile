name: Run tests on BSDs

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths-ignore:
      - 'docs/**'

  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'

jobs:
  test-freebsd:
    name: Run tests on FreeBSD
    runs-on: ubuntu-latest
    strategy:
      matrix:
        freebsd_version: ['14.3', '15.0']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: Build tests
        run: |
          go build -o test-helper ./testhelper
          go test -c ./batt ./calendar ./util/...
          echo "export TEST_HELPER=$PWD/test-helper" >./run-tests.sh
          chmod +x ./run-tests.sh
          find . -type f -name "*.test" ! -name "batt.test" | xargs -I % echo "echo === % === && % -test.short -test.v" >>./run-tests.sh
        env:
          GOOS: freebsd

      - name: Run tests in VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '${{ matrix.freebsd_version }}'
          memory: 8G
          cpu_count: 4
          run: |
            pwd
            ./run-tests.sh


  test-netbsd:
    name: Run tests on NetBSD
    runs-on: ubuntu-latest
    strategy:
      matrix:
        netbsd_version: ['10.1']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
