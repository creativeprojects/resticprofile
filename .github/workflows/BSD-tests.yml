          chmod +x ./run-tests.sh
          find . -type f -name "*.test" | xargs -I % echo "echo === % === && % -test.short -test.v" >>./run-tests.sh
        env:
          GOOS: netbsd

      - name: Run tests in VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: netbsd
          version: '${{ matrix.netbsd_version }}'
          memory: 8G
          cpu_count: 4
          run: |
            pwd
            ./run-tests.sh


  test-openbsd:
    name: Run tests on OpenBSD
    runs-on: ubuntu-latest
    strategy:
      matrix:
        openbsd_version: ['7.8']
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          check-latest: true
          cache: true

      - name: Build tests
        run: |
          go build -o test-helper ./testhelper
          go test -c ./batt ./calendar ./util/...
          echo "export TEST_HELPER=$PWD/test-helper" >./run-tests.sh
